[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "raspberrypi4"
  omit_hostname = false

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["sensors/esp32/data"]
  qos = 1
  data_format = "json"
  name_override = "weather"
  json_string_fields = []

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  report_active = true

[[inputs.mem]]

[[inputs.system]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.file]]
  files = ["/host/sys/class/thermal/thermal_zone0/temp"]
  name_override = "pi_cpu_temp"
  data_format = "value"
  data_type = "integer"

[[inputs.ping]]
  urls = ["1.1.1.1"]
  count = 4
  interval = "5m"
  timeout = 1.0
  ping_interval = 1.0
  method = "exec"

[[inputs.internet_speed]]
  interval = "5m"
  enable_file_download = false
  memory_saving_mode = true
